name: Build Push Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker image
      run: docker build -t tholiwe/flask-docker-app .

    - name: Push Docker image
      run: docker push tholiwe/flask-docker-app

- name: Deploy to EC2
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USER }}
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      sudo docker stop $(sudo docker ps -q) || true
      sudo docker rm $(sudo docker ps -aq) || true
      sudo docker pull tholiwe/flask-docker-app
      sudo docker run -d -p 5000:5000 tholiwe/flask-docker-app  
          sudo docker stop $(sudo docker ps -q) || true          sudo docker rm $(sudo docker ps -aq) || true
          sudo docker pull tholiwe/flask-docker-app
          sudo docker run -d -p 5000:5000 tholiwe/flask-docker-app
